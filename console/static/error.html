<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{CODE}} {{TITLE}} — Clawthon ISEAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #ff747d;
      --red-dark: #e05a63;
      --red-light: #fff0f1;
      --red-border: #ffd6d8;
      --text: #111827;
      --text-muted: #6b7280;
      --bg: #fafafa;
      --surface: #ffffff;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header-logo { height: 26px; object-fit: contain; }
    .header-div { width: 1px; height: 18px; background: var(--border); }
    .header-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }
    .error-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 56px 64px;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }
    .error-stripe {
      width: 48px;
      height: 4px;
      background: var(--red);
      border-radius: 2px;
      margin: 0 auto 28px;
    }
    .error-code {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 72px;
      font-weight: 700;
      color: var(--red);
      line-height: 1;
      margin-bottom: 12px;
      letter-spacing: -2px;
    }
    .error-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
    }
    .error-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 24px;
      background: var(--red);
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.15s;
    }
    .btn-home:hover { background: var(--red-dark); }
    footer {
      text-align: center;
      padding: 20px;
      font-size: 11px;
      color: #d1d5db;
      border-top: 1px solid var(--border);
      font-family: 'Space Grotesk', sans-serif;
    }
  </style>
</head>
<body>
  <header>
    <img class="header-logo" src="/static/iseai-logo.svg" alt="ISEAI">
    <div class="header-div"></div>
    <span class="header-title">Clawthon ISEAI</span>
  </header>
  <main>
    <div class="error-card">
      <div class="error-stripe"></div>
      <div class="error-code">{{CODE}}</div>
      <div class="error-title">{{TITLE}}</div>
      <div class="error-desc">{{DESC}}</div>
      <a class="btn-home" href="/">ホームへ戻る</a>
    </div>
  </main>
  <footer>Clawthon ISEAI — AI Hackathon Platform</footer>
</body>
</html>
