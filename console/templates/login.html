<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clawthon ISEAI 管理コンソール</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f7fa; color: #1f2937; font-family: system-ui, sans-serif;
           display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 12px;
            padding: 40px; width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .logo-area { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .logo-badge { background: #7c3aed; color: white; font-weight: 700; font-size: 13px;
                  padding: 4px 10px; border-radius: 6px; letter-spacing: 1px; }
    h1 { font-size: 20px; color: #111827; font-weight: 700; }
    .sub { color: #6b7280; font-size: 13px; margin-bottom: 28px; }
    label { display: block; font-size: 13px; color: #374151; font-weight: 500; margin-bottom: 6px; }
    input[type=password] {
      width: 100%; padding: 10px 14px; background: #f9fafb;
      border: 1px solid #d1d5db; border-radius: 6px; color: #111827;
      font-size: 15px; outline: none; transition: border 0.2s;
    }
    input[type=password]:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px #7c3aed20; }
    button {
      width: 100%; margin-top: 20px; padding: 12px;
      background: #7c3aed; border: none; border-radius: 6px;
      color: white; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #6d28d9; }
    .error { color: #dc2626; font-size: 13px; margin-top: 12px; text-align: center;
             background: #fef2f2; border: 1px solid #fecaca; border-radius: 6px; padding: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-area">
      <span class="logo-badge">ISEAI</span>
      <h1>Clawthon 管理コンソール</h1>
    </div>
    <p class="sub">運営者専用ダッシュボード</p>
    <form method="post" action="/login">
      <label>管理パスワード</label>
      <input type="password" name="password" autofocus placeholder="パスワードを入力してください">
      <button type="submit">ログイン</button>
    </form>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
  </div>
</body>
</html>
