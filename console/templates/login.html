<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clawthon ISEAI — 管理コンソール</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, #fff5f5 0%, #ffffff 50%, #fff0f0 100%);
      color: #1e293b;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .wrapper { width: 100%; max-width: 400px; padding: 24px; }
    .logo-area { text-align: center; margin-bottom: 32px; }
    .logo-area img { height: 40px; object-fit: contain; }
    .card {
      background: #ffffff;
      border: 1px solid #ffe4e6;
      border-radius: 16px;
      padding: 40px 36px;
      box-shadow: 0 8px 32px rgba(255,116,125,0.12);
    }
    h1 { font-size: 20px; font-weight: 700; color: #111827; margin-bottom: 4px; text-align: center; }
    .sub { color: #6b7280; font-size: 13px; margin-bottom: 28px; text-align: center; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #374151; font-weight: 500; margin-bottom: 6px; }
    input[type=email], input[type=password] {
      width: 100%; padding: 11px 14px;
      background: #fafafa;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      color: #111827;
      font-size: 15px;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
    }
    input[type=email]:focus, input[type=password]:focus {
      border-color: #ff747d;
      box-shadow: 0 0 0 3px rgba(255,116,125,0.15);
    }
    button {
      width: 100%; margin-top: 8px; padding: 13px;
      background: #ff747d;
      border: none; border-radius: 50px;
      color: white; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.2s, transform 0.15s;
      box-shadow: 0 4px 16px rgba(255,116,125,0.35);
    }
    button:hover { background: #e05a63; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    .error {
      color: #dc2626; font-size: 13px; margin-top: 14px; text-align: center;
      background: #fef2f2; border: 1px solid #fecaca;
      border-radius: 8px; padding: 10px;
    }
    .divider { border: none; border-top: 1px solid #f3f4f6; margin: 24px 0; }
    .footer-text { text-align: center; font-size: 12px; color: #9ca3af; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="logo-area">
      <img src="/static/iseai-logo.svg" alt="ISEAI">
    </div>
    <div class="card">
      <h1>管理コンソール</h1>
      <p class="sub">Clawthon ISEAI — 運営者専用</p>
      <form method="post" action="/login">
        <div class="form-group">
          <label>メールアドレス</label>
          <input type="email" name="email" autofocus placeholder="admin@example.com" required>
        </div>
        <div class="form-group">
          <label>パスワード</label>
          <input type="password" name="password" placeholder="管理パスワード" required>
        </div>
        <button type="submit">ログイン</button>
      </form>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      <hr class="divider">
      <p class="footer-text">運営者のみアクセス可能です</p>
    </div>
  </div>
</body>
</html>
