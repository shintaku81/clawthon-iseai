name: 管理コンソール デプロイ

on:
  push:
    branches: [ main ]
    paths:
      - 'console/**'
      - 'infra/**'
  workflow_dispatch:

jobs:
  deploy:
    name: 管理VMへデプロイ
    runs-on: ubuntu-latest
    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: SSH鍵を設定
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: 既知のホストを追加
        run: |
          ssh-keyscan -H 34.84.2.212 >> ~/.ssh/known_hosts

      - name: 管理VMにデプロイ
        run: |
          # コードをコピー（データファイルは除外）
          rsync -avz --delete \
            --exclude='participants.json' \
            --exclude='settings.json' \
            --exclude='*.log' \
            console/ \
            shintaku81@34.84.2.212:/opt/clawthon/console/

          rsync -avz --delete \
            infra/ \
            shintaku81@34.84.2.212:/opt/clawthon/infra/

          # スクリプトに実行権限を付与
          ssh shintaku81@34.84.2.212 'chmod +x /opt/clawthon/infra/*.sh'

          # ゼロダウンタイム再起動（新プロセス起動後に旧プロセス終了）
          ssh shintaku81@34.84.2.212 '
            sudo systemctl restart clawthon-console
            # 起動確認（最大15秒待機）
            for i in $(seq 1 15); do
              sudo systemctl is-active clawthon-console | grep -q "^active" && exit 0
              sleep 1
            done
            echo "起動タイムアウト" && exit 1
          '

      - name: デプロイ完了通知
        if: success()
        run: echo "✅ デプロイ完了 — https://console.iseai.neuratools.ai"
