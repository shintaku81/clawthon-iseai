<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{VM_NAME}} — Clawthon ISEAI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #ffffff;
      color: #1f2937;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #ffffff;
      border-bottom: 1px solid #ffe4e6;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 1px 6px rgba(255,116,125,0.08);
    }
    .header-logo { height: 28px; object-fit: contain; }
    .vm-name {
      font-size: 14px;
      font-weight: 600;
      color: #374151;
    }
    .vm-sub {
      font-size: 12px;
      color: #9ca3af;
      margin-left: auto;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 8px;
      text-align: center;
    }
    .subtitle {
      font-size: 15px;
      color: #6b7280;
      margin-bottom: 48px;
      text-align: center;
    }

    .cards {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 760px;
    }
    .card {
      background: #ffffff;
      border: 2px solid #e5e7eb;
      border-radius: 16px;
      padding: 36px 32px;
      width: 320px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s;
      cursor: pointer;
      display: block;
    }
    .card:hover {
      border-color: #ff747d;
      box-shadow: 0 8px 32px rgba(255,116,125,0.15);
      transform: translateY(-2px);
    }
    .card-icon {
      font-size: 48px;
      margin-bottom: 16px;
      display: block;
    }
    .card-title {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 8px;
    }
    .card-desc {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.6;
    }
    .card-badge {
      display: inline-block;
      margin-top: 14px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-oh { background: #fff5f5; color: #ff747d; border: 1px solid #ffb3b7; }
    .badge-vs { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #d1d5db;
      border-top: 1px solid #f3f4f6;
    }
  </style>
</head>
<body>
  <header>
    <img class="header-logo" src="https://iseai.jp/ISE-Ai2.svg" alt="ISEAI">
    <span class="vm-name">Clawthon {{VM_NAME}}</span>
    <span class="vm-sub">AI開発環境</span>
  </header>

  <main>
    <h1>ようこそ、Clawthon へ！</h1>
    <p class="subtitle">使用するツールを選択してください</p>

    <div class="cards">
      <!-- OpenHands -->
      <a class="card" href="/openhands/" target="_self">
        <span class="card-icon">🤖</span>
        <div class="card-title">OpenHands</div>
        <div class="card-desc">
          AIエージェントと協力してコードを開発します。<br>
          自然言語でタスクを指示できます。
        </div>
        <span class="card-badge badge-oh">AI エージェント</span>
      </a>

      <!-- VSCode / code-server -->
      <a class="card" href="/code/" target="_self">
        <span class="card-icon">💻</span>
        <div class="card-title">VSCode</div>
        <div class="card-desc">
          ブラウザで使えるVisual Studio Code。<br>
          コードの編集・実行・デバッグができます。
        </div>
        <span class="card-badge badge-vs">コードエディタ</span>
      </a>
    </div>
  </main>

  <footer>Clawthon ISEAI — ハッカソン参加者向け AI 開発環境</footer>
</body>
</html>
