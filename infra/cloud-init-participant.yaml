#cloud-config
# 変数はVM作成時に置換される:
#   PARTICIPANT_ID_PLACEHOLDER, LITELLM_KEY_PLACEHOLDER, MODEL_PLACEHOLDER,
#   OH_VERSION_PLACEHOLDER, DOMAIN_PLACEHOLDER, MANAGEMENT_IP_PLACEHOLDER
package_update: true

packages:
  - docker.io
  - docker-compose-v2
  - nginx
  - certbot
  - python3-certbot-nginx

runcmd:
  # Node.js 20.x (Claude Code requires Node 18+)
  - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
  - apt-get install -y nodejs

  # Claude Code (OpenClaw) インストール
  - npm install -g @anthropic-ai/claude-code
  - echo 'export PATH="$PATH:/usr/local/lib/node_modules/.bin"' >> /etc/profile
  - claude --version > /tmp/openclaw-version.txt 2>&1 || echo "claude install pending" > /tmp/openclaw-version.txt

  - systemctl enable docker && systemctl start docker
  - mkdir -p /opt/clawthon/workspace ~/.openhands

  # code-server 起動
  - |
    docker run -d --name code-server --restart=unless-stopped \
      -p 8080:8080 \
      -e PASSWORD=clawthon2026 \
      -v /opt/clawthon/workspace:/home/coder/project \
      codercom/code-server:latest

  # OpenHands 起動（APIキー未設定でも起動 → UI内で後から設定可）
  - |
    EXTRA_ENV=""
    if [ "LITELLM_KEY_PLACEHOLDER" != "" ] && [ "LITELLM_KEY_PLACEHOLDER" != "LITELLM_KEY_PLACEHOLDER" ]; then
      EXTRA_ENV="-e LLM_API_KEY=LITELLM_KEY_PLACEHOLDER -e LLM_BASE_URL=http://MANAGEMENT_IP_PLACEHOLDER:4000 -e LLM_MODEL=MODEL_PLACEHOLDER"
    fi
    docker run -d --name openhands --restart=unless-stopped \
      -p 3000:3000 \
      $EXTRA_ENV \
      -v /var/run/docker.sock:/var/run/docker.sock \
      -v /opt/clawthon/workspace:/opt/workspace \
      -v ~/.openhands:/root/.openhands \
      ghcr.io/all-hands-ai/openhands:OH_VERSION_PLACEHOLDER

  # nginx 設定（server_name込み）
  - |
    cat > /etc/nginx/sites-available/clawthon << 'NGINX'
    server {
        listen 80;
        server_name pPARTICIPANT_ID_PLACEHOLDER.DOMAIN_PLACEHOLDER;
        client_max_body_size 100M;

        location /openhands/ {
            proxy_pass http://localhost:3000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 300s;
        }
        location /code/ {
            proxy_pass http://localhost:8080/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
        root /var/www/clawthon;
        index index.html;
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
    NGINX
  - ln -sf /etc/nginx/sites-available/clawthon /etc/nginx/sites-enabled/clawthon
  - rm -f /etc/nginx/sites-enabled/default
  - mkdir -p /var/www/clawthon
  - nginx -t && systemctl reload nginx
  - echo "参加者VM初期化完了 (OpenClaw + OpenHands + VSCode)" > /tmp/init-done.txt
