#cloud-config
# Variables substituted at creation time:
#   PARTICIPANT_ID, LITELLM_KEY, MODEL_NAME
package_update: true

packages:
  - docker.io
  - docker-compose
  - nginx

runcmd:
  - systemctl enable docker && systemctl start docker
  - mkdir -p /opt/clawthon/workspace
  - |
    cat > /opt/clawthon/docker-compose.yml << 'COMPOSE'
    version: '3.8'
    services:
      openhands:
        image: docker.all-hands.dev/all-hands-ai/openhands:0.38
        environment:
          - LLM_API_KEY=LITELLM_KEY_PLACEHOLDER
          - LLM_BASE_URL=http://MANAGEMENT_IP_PLACEHOLDER:4000
          - LLM_MODEL=MODEL_PLACEHOLDER
          - SANDBOX_RUNTIME_CONTAINER_IMAGE=docker.all-hands.dev/all-hands-ai/runtime:0.38-nikolaik
          - WORKSPACE_BASE=/opt/workspace
        volumes:
          - /opt/clawthon/workspace:/opt/workspace
          - /var/run/docker.sock:/var/run/docker.sock
        ports:
          - "3000:3000"
        restart: unless-stopped
      code-server:
        image: codercom/code-server:latest
        environment:
          - PASSWORD=clawthon2026
          - HASHED_PASSWORD=
        volumes:
          - /opt/clawthon/workspace:/home/coder/project
        ports:
          - "8080:8080"
        restart: unless-stopped
    COMPOSE
  - cd /opt/clawthon && docker compose up -d
  - |
    cat > /etc/nginx/sites-available/clawthon << 'NGINX'
    server {
        listen 80 default_server;
        client_max_body_size 100M;
        location /code/ {
            proxy_pass http://localhost:8080/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
        location / {
            proxy_pass http://localhost:3000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
    NGINX
  - ln -sf /etc/nginx/sites-available/clawthon /etc/nginx/sites-enabled/clawthon
  - rm -f /etc/nginx/sites-enabled/default
  - nginx -t && systemctl reload nginx
  - echo "Participant VM ready" > /tmp/init-done.txt
